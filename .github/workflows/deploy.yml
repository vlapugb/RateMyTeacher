name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_healthcheck:
        description: "Skip healthcheck delay"
        type: boolean
        default: false

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Upload deploy script
        run: |
          scp scripts/deploy.sh root@${{ secrets.SSH_HOST }}:/root/studradar/scripts/deploy.sh

      - name: Run deploy
        run: |
          ssh root@${{ secrets.SSH_HOST }} "bash /root/studradar/scripts/deploy.sh"
